    <b>Notes</b>
<p>
The theme of this crossword is the BBC TV political SATIRE (21d) from the 1980s, <i>Yes Minister.</i> The title of the sequel, <i>YES PRIME MINISTER,</i> forms the nina in this crossword, running across the fourth row from the top and the fourth row from the bottom.
</p>

<p>
The show features a crafty CIVIL (1a) SERVANT (26a), Sir Humphrey Appleby, who almost always manages to have his way with the mostly hapless minister (and later, prime minister), Jim HACKER (24a). 
</p>

<p>
The title of the crossword refers to the opening EPISODE (27a) of the show, which was titled <i>Open Government.</i>
</p>

<b>Personal notes</b>
<p>
The final part of this summer has been a busy time for me, at home, at work, as well as for crossword-setting.
</p>

<p>
The son started his college journey at San Jose State University (majoring in aviation). The daughter visited from Boston for a couple of weeks. She was craving rava-coconut laddus (like my late mother-in-law used to make), so we got some from a local store and those were not particularly good. I then had a go at making them at home myself, following the recipe in <i>Ruchira</i>. These turned out quite well (except that next time I need to reduce the quantity of sugar even more).
</p>
