    <b>Notes</b>
<p>
The theme of this puzzle is the Hindi movie, <i>Lagaan.</i> The title can be seen as a nina running across the middle row. The movie's plot involves a cricket match played in 1893 between drought-stricken Indian villagers and colonial Britishers, with an arrogant British officer wagering to cancel their land tax if they win, but tripling it if they lose (hence the title, <i>Triple Or Nothing</i>).
</p>

<p>
The name of the village, CHAMPANER, can be seen as a nina starting with 1a and snaking through parts of 3d and 9a. The word CRICKET is the entry in 10a. Three thematic words appear within the clues: "English" (21d), "wager" (24d), and "tax" (13a).
</p>

<p>

<b>Personal notes</b>

</p>
